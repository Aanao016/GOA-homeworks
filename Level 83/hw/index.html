<!-- 4)ახსენით თუ რა კუთვნილებები ვისწავლეთ flex თან დაკავშირებით x ღერძზე ელემენტების განლაგების დროს,განმარტე თითოეული მათგანი -->
<!-- flex-start  ელემენტები იწყება მარცხნიდან
flex-end  ელემენტები მიდის მარჯვნივ
center  ელემენტები შუაში
space-between  შორს შორს (პირველი მარცხნივ, ბოლო მარჯვნივ)
space-around  გარშემო სივრცით
space-evenly  თანაბარი დაშორება -->
<!-- 5)კომენტატის სახით ახსენით თუ რა არის gap  -->

<!-- gap გამოიყენება flex ელემენტებს შორის დაშორებისთვის -->

<!-- 6)შექმენი კონტეინერი (width: 500px) და 3 ბლოკი. -->

<div class="parent">

  <img src="./Sanrio My Melody Pink Arrow--cursor--SweezyCursors..cur">

<!-- 10)შექმენი ერთი დაუნომრავი სია მიეცით ბორდერი,ამ დაუნომრავ სიაში შექმენი რამდენიმე სიის ელემენტი სადაც ეწერება მაგ: home , menu , about us , contact us ..., შენი დავალებაა რომ ეს სიის ელემენტები განალაგო ჰორიზონტალურად მშობელ ელემენტში, მოაშორე bullet ანუ წერტილები და დააშორო ერთმანეთს 50px ით თითეული ელემენტი(გამოგივათ ნავიგაცია რომელსაც მომავალში ბევრჯერ გამოვიყენებთ -->

</ul>
<!-- 12) შექმენით ქვემოთ მოცემული ფოტოს ანალოგი ფორმა გამოიყენეთ flex და ნასწავლი მასალა     -->
<div class="container">

მოიყვანე სამივეზე თითო მაგალით -->



<!-- 14)შექმენი კონტეინერი, სადაც არის 8 ბლოკი (div).

ბლოკების სიგანე იყოს 120px.
გააკეთე ისე, რომ ელემენტები გადავიდნენ ახალ ხაზზე საჭიროების შემთხვევაში. -->

გამოიყენე ისეთი მნიშვნელობა flex-wrap-ზე, რომ ელემენტები არ გადავიდნენ ახალ ხაზზე ანუ არ შეიფუთნონ მშობელ ელემენტი -->

<div class="container">

<!-- 17)გაქვს კონტეინერი (height: 300px).
შიგნით არის 3 div.

<div class="container">

</div>

<!-- 18)გაქვს flex კონტეინერი (height: 400px) 4 ელემენტით.

გამოიყენე align-self თითოეულზე ინდივიდუალურად  -->

<div class="container">
  <div class="box one"></div>
  <div class="box two"></div>
  <div class="box three"></div>
  <div class="box four"></div>
