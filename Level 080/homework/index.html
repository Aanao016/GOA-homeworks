<!DOCTYPE html>

<body>
<!-- 1) შექმენით 4 პარაგრაფი, პირველს გაუწერე ზედა margin 20px, მეორეს მარცხენა margin 10px, მესამეს მარჯვენა margin 15px, და მეოთხეს ქვედა margin 5px. -->
<p>word 1</p>
<p>word 2</p>
<p>word 3</p>
<p>word 4</p>
<!-- 2) შექმენი ერთი დივი და გაუწერე შემდეგი სტილები: საზღვრის სისქე 2px, solid და შავი, ფერი წითელი, უკანა ფონის ფერი ლურჯი, სიმაღლე 300px სიგანე 300px, ოთხივე მხარეს ბორდერსა და კონტენტს შორის იყოს 100px დაშორება. -->
<div class="div2">div</div>
<!-- 3) შექმენი ერთი დივი, შიგნით მოათავსეთ ერთი ღილაკი და გაუწერე შემდეგი სტილები: საზღვრის სისქე 2px, solid და შავი, მწვანე, უკანა ფონის ფერი ვარდისფერი, სიმაღლე 250px სიგანე 250px, კონტენტსა და ბორდერს შორის დაშორება იყოს მარჯვნიდან და მარცხნიდან 150px და ზემოდან და ქვემოდან 200px. ღილაკს მიანიჭე შემდეგი სტილები: ბორდერსა და კონტენტს შორის ოთხივე გვერდიდან დაშორება იყოს 20px. -->

<div class="divbtn-">
    <button>Anno</button>
</div>
<!-- 4) შექმენი ერთი დივი, შიგნით მოათავსეთ ერთი ფოტო. დივს გაუწერეთ შემდეგი სტილები: საზღვრის სისქე 3px solid და წითელი, ფერი ლურჯი, უკანა ფონის ფერი იასამნისფერი. ფოტოს და ბორდერს შორის დაშორება იყოს ზემოდან 25px, მარჯვნიდან 60px, ქვემოდან 45px, და მარცხნიდან 89px. -->
<div class="div4">
    <img src="https://via.placeholder.com/100" alt="photo">
</div>
<!-- 5) შექმენი ერთი დივი, შიგნით მოათავსეთ ერთი ღილაკი, დივს გაუწერეთ შემდეგი სტილები: საზღვრის სისქე 6px, solid და ყვითელი, უკანა ფონის ფერი ყავისფერი, სიმაღლე და სიგანეც 150px. ღილაკს და საზღვარს შორის დაშორება მხოლოდ ზემოდან იყოს 900px. ღილაკს გაუწერეთ შემდეგი სტილები: დაშორება კონტენტსა და ბორდერს შორის იყოს მხოლოდ ქვემოდან 50px. -->
<div class="div5">
    <button>Click</button>
</div>
<!-- 6) შექმენით ერთი input თეგი და მიანიჭეთ შემდეგი სტილები: საზღვარი ჰქონდეს ყველა მხრიდან, საზღვრის სისქე იყოს 10px, solid და მწვანე. -->
<input class="input6" type="text" placeholder="input">

<br><br>
<!-- 7) შექმენით ერთი input, გაუწერეთ ზომა, ფერი, უკანა ფონის ფერი და საზღვარი თქვენი გემოვნების მიხედვით. ამ დივს მიანიჭეთ ოთხივე მხარეს განსხვავებული ფერის ბორდერები. -->
<input class="input7" type="text" placeholder="input">

<br><br>

<!-- 8) შექმენით ერთი პარაგრაფი, შემდეგ ერთი ღილაკი და შემდეგ ერთი h1 სათაური. ღილაკს გაუწერეთ padding კუთვნილება ზემოდან და ქვემოდან 60px, გვერდებიდან 40px, ასევე მიანიჭეთ ყველა მხარეს სხვა და სხვა ფერის საზღვრები. ასევე დააშორეთ ყველა თეგი ოთხივე მხრიდან 148px-ით margin კუთვნილების გამოყენებით.-->
<p>ეს არის პარაგრაფი</p>
<button class="btn8">Click</button>
<h1>ეს არის სათაური</h1>

</body>
</html>
