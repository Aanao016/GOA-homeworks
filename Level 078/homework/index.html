<body>
    <div class="signin_">
        <h1>Sign in</h1>
        <form>
            <input type="text" placeholder="user name" class="grey_" /><br><br>
            <input type="password" placeholder="password" class="grey_" /><br><br>

    <!-- ააგეთ დფამატებით თქვენი გემოვნებით დახვეწილი 3 სარეგისტრაციო ფორმა სადაც გამოიყენებთ გავლილ მასალას და ასევე fseudo selector ებს hover,active,focus ,, ამ დავალებაში form ების გასასტილად ყველგან გამოიყენეთ ელემენტის გასრილვა ატრიბუტით რომელიც ვისწავლეთ დღევანდელ გაკვეთილზე, CLASS და ID ებით არ იყოს გასტილული ფორმები -->

    <form name="reg_"> 
        <h2>Registration</h2>
        <input type="text" placeholder="Username">
        <input type="password" placeholder="Password">
        <button type="submit">Sign Up</button>
    </form>
</body>
