<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 1)შექმენი სარეგისტრაციო ფორმა->
სადაც მომ ხმარებელი შეიუვანს სახელს ემაილს და მის პაროლს
გამოიყენეთ placeholder ,label არ არის საჭირო -->

<!-- თითიეული input ის სტილები -> მოაშორეთ outline , უკანა ფონის ფერი იყოს მწვანე , border ქონდეს წითელი , ტექსტის ფერი ქონდეს ლურჯი , მოუმრგვალეთ კუთხეები 10px ით, შეუცვალეთ კალიგრაფია, გახადეთ მუქი  -->

<!-- input თეგებს რომ დააკლიკბთ მიიღონ მათ შემდეგი სტილები -> ფონის ფერი გახდეს შავიო , ტექსტის ფერი თეთრი , ბორდერი საერთოდ მოშორდეს , მოუმსრგვალდეს კუთხეები 10 px ით ,და გახდეს მუქის ნაცვლად თხელი ტექსტი -->

<form>
    <input type="text" placeholder="სახელი" required>
    <input type="email" placeholder="ემაილი" required>
    <input type="password" placeholder="პაროლი" required>
    <input type="submit" value="რეგისტრაცია" required >
</form>

</body>
</html>
